<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="culturama-favico.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <main>
        <header>
            <img src="img/logo-culturama.png" alt="Logo da Culturama">
            <h1>Pesquisa de opinião</h1>
        </header>
        <section>
            <form action="" method="get">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label for="name">Nome</label>
                    <input id="name" type="text" name="userName" required>
                    <br>
                    <label for="age">Idade</label>
                    <input id="age" type="number" name="userAge" min="12" max="100" required>
                    <br>
                    <label for="birthDate">Data de nascimento</label>
                    <input id="birthDate" type="date" name="userBirthDate">
                    <br>
                    <label for="email">Email</label>
                    <input id="email" type="email" name="userEmail">
                    <br>
                    <label for="numberPhone">Telefone</label>
                    <input id="numberPhone" type="tel" name="userNumberPhone" pattern="[0-9]{11}" placeholder="DDD + número sem espaços ou hífen">
                    <br>
                    <label for="image">Upload de foto</label>
                    <input id="image" type="file" accept="image/*" name="userImage">
                    <br>
                </fieldset>
                
                <fieldset>
                    <legend>Perfil</legend>
                    <p>Gênero:</p>
                    <input id="fem" type="radio" name="userGender" value="Feminino">
                    <label for="fem">Feminino</label>
                    <input id="mask" type="radio" name="userGender" value="Masculino">
                    <label for="mask">Masculino</label>
                    <input id="notInformed" type="radio" name="userGender" value="notInformed">
                    <label for="notInformed">Prefiro não informar</label>
                    <br>
                    <label for="maritalStatus">Estado Cívil</label>
                    <select id="maritalStatus" name="userMaritalStatus">
                        <option value="notInformed">Selecione...</option>
                        <option value="casado">Casado</option>
                        <option value="solteiro">solteiro</option>
                        <option value="divorciado">Divorciado</option>
                        <option value="uniao-estavel">União estável</option>
                    </select>
                    <br>
                    <label for="state" required>Estado</label>
                    <select id="state" name="userState">
                        <option value="acre">Acre</option>
                        <option value="alagoas">Alagoas</option>
                        <option value="amapá">Amapá</option>
                        <option value="amazonas">Amazonas</option>
                        <option value="bahia">Bahia</option>
                        <option value="ceará">Ceará</option>
                        <option value="distritoFederal">Distrito Federal</option>
                        <option value="espiritoSanto">Espirito Santo</option>
                        <option value="goiás">Goiás</option>
                        <option value="maranhão">Maranhão</option>
                        <option value="matoGrossoDoSul">Mato Grosso do Su</option>
                        <option value="matoGrosso">Mato Grosso</option>
                        <option value="minasGerais">Minas Gerais</option>
                        <option value="pará">Pará</option>
                        <option value="paraíba">Paraíba</option>
                        <option value="paraná">Paraná</option>
                        <option value="pernambuco">Pernambuco</option>
                        <option value="piauí">Piauí</option>
                        <option value="rioDeJaneiro">Rio de Janeiro</option>
                        <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                        <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                        <option value="rondônia">Rondônia</option>
                        <option value="roraima">Roraima</option>
                        <option value="santaCatarina">Santa Catarina</option>
                        <option value="sãoPaulo">São Paulo</option>
                        <option value="sergipe">Sergipe</option>
                        <option value="tocantins">Tocantins</option>
                    </select>
                    <br>
                    <label for="city">Cidade</label>
                    <input id="city" type="text" name="userCity" autocomplete="address-level2">
                </fieldset>
                
                <fieldset>
                    <legend>Hábitos</legend>
                    <p>Redes Sociais</p>
                    <input id="instagram" type="checkbox" name="social" value="instagram">
                    <label for="instagram">Instagram</label>
                    <br>
                    <input id="facebook" type="checkbox" name="social" value="facebook">
                    <label for="facebook">Facebook</label>
                    <br>
                    <input id="linkedin" type="checkbox" name="social" value="linkedin">
                    <label for="linkedin">Linkedin</label>
                    <br>
                    <input id="x" type="checkbox" name="social" value="x">
                    <label for="x">X</label>
                    <br>
                    <label for="musicStyle">Estilo musical:</label>
                    <input list="styleTypes" id="musicStyle" name="userMusicStyle" type="text">
                    <datalist id="styleTypes">
                        <option value="Rock"></option>
                        <option value="Pop"></option>
                        <option value="Samba"></option>
                        <option value="Sertanejo"></option>
                        <option value="Pagode"></option>
                    </datalist>
                    <br>
                    <label for="color">Cor Favorita</label>
                    <input type="color" name="userFavoritColor" id="color">
                </fieldset>
                <fieldset>
                    <legend>Opniões</legend>
                    <p>O que você acha da qualidade do nosso serviço?</p>
                    <input type="radio" name="userServiceOpnion" id="otima" value="otima">
                    <label for="otima">Ótima</label>
                    <br>
                    <input type="radio" name="userServiceOpnion" id="boa" value="boa">
                    <label for="boa">Boa</label>
                    <br>
                    <input type="radio" name="userServiceOpnion" id="regular" value="regular">
                    <label for="regular">Regular</label>
                    <br>
                    <input type="radio" name="userServiceOpnion" id="ruim" value="ruim">
                    <label for="ruim">Ruim</label>
                    <br>
                    <label for="comment">Comentário</label>
                    <textarea name="userComment" id="comment" placeholder="Digite aqui sua opnião..."></textarea>
                </fieldset>
                <fieldset>
                    <legend>Confirmações</legend>
                    <input type="checkbox" name="userLgpdTerm" id="lgpdTerm" value="accepted" required>
                    <label for="lgpdTerm">Eu aceito participar da Pesquisa</label>
                    <br>
                    <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                    <label for="getResult">Desejo receber o resultado por email</label>
                </fieldset>
                
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </form>
        </section>
    </main>
    </body>
    </html>
